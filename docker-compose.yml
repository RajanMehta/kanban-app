services:
  backend:
    build:
      context: ./backend
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Data Source=/data/kanban.db
      - Cors__AllowedOrigins__0=http://localhost:3000
    volumes:
      - kanban-data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5050
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  kanban-data:
